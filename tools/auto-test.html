<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>드롭다운 자동 검증</title>
<link rel="stylesheet" href="../css/style.css?v=20260514">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
body { font-family: sans-serif; padding-top: 90px; padding-left: 20px; background:#f5f5f5; }
.log { background:#1a1a1a; color:#0f0; padding:16px; border-radius:8px;
       font-size:0.85rem; line-height:1.8; margin-top:16px; min-height:200px; }
.err  { color:#ff5252; }
.ok   { color:#69f0ae; }
.warn { color:#ffd740; }
</style>
</head>
<body>

<!-- 실제 헤더 구조 복제 -->
<header class="site-header">
  <div class="container header-inner">
    <span class="logo">운세<span class="logo-on">ON</span></span>
    <div class="header-actions" id="headerActions">
      <div class="point-display" id="headerPoints" style="display:none">
        <i class="fas fa-coins"></i> <span id="headerPointVal">0</span>P
      </div>
      <a href="#" class="btn btn-login"  id="btnLogin">로그인</a>
      <a href="#" class="btn btn-signup" id="btnSignup">회원가입</a>
      <div class="user-menu-wrap" id="userMenuWrap" style="display:none">
        <button class="user-menu-btn" id="userMenuBtn">
          <div class="user-avatar" id="userAvatar">U</div>
          <span class="user-name-label" id="userNameLabel">사용자</span>
          <i class="fas fa-chevron-down" style="font-size:0.7rem"></i>
        </button>
        <div class="user-dropdown" id="userDropdown" style="display:none">
          <div class="user-dropdown-header">
            <div class="user-dropdown-name"  id="dropdownName"></div>
            <div class="user-dropdown-email" id="dropdownEmail"></div>
            <div class="user-dropdown-pt"><i class="fas fa-coins"></i> <span id="dropdownPtVal">0</span>P</div>
          </div>
          <div class="user-dropdown-links">
            <a href="#"><i class="fas fa-bolt"></i> 포인트 충전</a>
            <a href="#"><i class="fas fa-history"></i> 이용 내역</a>
          </div>
          <button class="user-logout-btn" id="userLogoutBtn">
            <i class="fas fa-sign-out-alt"></i> 로그아웃
          </button>
        </div>
      </div>
      <a href="#" class="btn btn-charge" id="btnCharge">충전하기</a>
    </div>
  </div>
</header>

<div class="log" id="logBox"></div>

<script src="../js/auth.js?v=20260514a"></script>
<script>
/* ── 로그 헬퍼 ── */
const logBox = document.getElementById('logBox');
let passCount = 0, failCount = 0;
function log(msg, type) {
  console.log('[auto-test]', msg);
  const d = document.createElement('div');
  d.className = type || '';
  d.textContent = msg;
  logBox.appendChild(d);
}
function pass(msg) { passCount++; log('✅ PASS: ' + msg, 'ok'); }
function fail(msg) { failCount++; log('❌ FAIL: ' + msg, 'err'); }
function info(msg) { log('ℹ️  ' + msg, 'warn'); }

/* ── 자동 테스트 실행 ── */
document.addEventListener('DOMContentLoaded', async function() {
  info('=== 자동 테스트 시작 ===');

  /* STEP 1: localStorage에 테스트 유저 삽입 */
  info('STEP 1: localStorage 테스트 유저 삽입');
  const fakeUser = { id:'test-uid-001', name:'김미화', email:'kimtest@unseon.co.kr', points:1500 };
  localStorage.setItem('sajuon_current_user', JSON.stringify(fakeUser));
  localStorage.setItem('sajuon_points', '1500');
  const storedUser = JSON.parse(localStorage.getItem('sajuon_current_user') || 'null');
  if (storedUser && storedUser.name === '김미화') pass('localStorage 유저 삽입 성공 (' + storedUser.name + ')');
  else fail('localStorage 유저 삽입 실패');

  /* STEP 2: 전역 함수 존재 확인 */
  info('STEP 2: 전역 함수 확인');
  if (typeof window.initAuthHeader  === 'function') pass('window.initAuthHeader 존재');
  else fail('window.initAuthHeader 없음');
  if (typeof window.toggleUserMenu  === 'function') pass('window.toggleUserMenu 존재');
  else fail('window.toggleUserMenu 없음');
  if (typeof window._openUserMenu   === 'function') pass('window._openUserMenu 존재');
  else fail('window._openUserMenu 없음');
  if (typeof window._closeUserMenu  === 'function') pass('window._closeUserMenu 존재');
  else fail('window._closeUserMenu 없음');
  if (typeof window.logout          === 'function') pass('window.logout 존재');
  else fail('window.logout 없음');

  /* STEP 3: initAuthHeader() 실행 */
  info('STEP 3: initAuthHeader() 호출');
  initAuthHeader();
  await tick(100);
  const wrap   = document.getElementById('userMenuWrap');
  const menuBtn = document.querySelector('.user-menu-btn');
  if (wrap && wrap.style.display === 'flex') pass('userMenuWrap display:flex — 사용자 메뉴 표시됨');
  else fail('userMenuWrap display:flex 아님 (현재: ' + (wrap ? wrap.style.display : 'null') + ')');
  const loginBtn = document.getElementById('btnLogin');
  if (loginBtn && loginBtn.style.display === 'none') pass('btnLogin 숨김 처리됨');
  else fail('btnLogin 숨김 실패 (현재: ' + (loginBtn ? loginBtn.style.display : 'null') + ')');
  const nameLabel = document.getElementById('userNameLabel');
  if (nameLabel && nameLabel.textContent === '김미화') pass('사용자 이름 표시: ' + nameLabel.textContent);
  else fail('사용자 이름 표시 실패 (현재: ' + (nameLabel ? nameLabel.textContent : 'null') + ')');

  /* STEP 4: data-bound 플래그 확인 */
  info('STEP 4: 버튼 이벤트 바인딩 확인');
  if (menuBtn && menuBtn.dataset.bound === '1') pass('user-menu-btn data-bound=1 설정됨');
  else fail('user-menu-btn data-bound 없음 → 이벤트 미바인딩!');
  const logoutBtn = document.querySelector('.user-logout-btn');
  if (logoutBtn && logoutBtn.dataset.bound === '1') pass('user-logout-btn data-bound=1 설정됨');
  else fail('user-logout-btn data-bound 없음 → 이벤트 미바인딩!');

  /* STEP 5: 드롭다운 열기 테스트 (_openUserMenu) */
  info('STEP 5: _openUserMenu() 직접 호출');
  _openUserMenu();
  await tick(100);
  const dd = document.getElementById('userDropdown');
  if (wrap && wrap.classList.contains('menu-open')) pass('userMenuWrap.menu-open 클래스 추가됨 (열림)');
  else fail('menu-open 클래스 없음 — 드롭다운 열리지 않음!');
  if (dd && dd.style.display === 'block') pass('userDropdown display:block — 드롭다운 보임');
  else fail('userDropdown display:block 아님 (현재: ' + (dd ? dd.style.display : 'null') + ')');

  /* STEP 6: 드롭다운 닫기 테스트 */
  info('STEP 6: _closeUserMenu() 호출');
  _closeUserMenu();
  await tick(100);
  if (wrap && !wrap.classList.contains('menu-open')) pass('menu-open 클래스 제거됨 (닫힘)');
  else fail('menu-open 클래스가 남아있음!');
  if (dd && dd.style.display === 'none') pass('userDropdown display:none — 드롭다운 숨겨짐');
  else fail('userDropdown display:none 아님 (현재: ' + (dd ? dd.style.display : 'null') + ')');

  /* STEP 7: 메뉴버튼 .click() 시뮬레이션 */
  info('STEP 7: menuBtn.click() 시뮬레이션');
  if (menuBtn) {
    menuBtn.click();
    await tick(150);
    if (wrap && wrap.classList.contains('menu-open')) pass('버튼 클릭 → 드롭다운 열림 ✓');
    else fail('버튼 클릭 → 드롭다운 열리지 않음! (stopPropagation 또는 이벤트 바인딩 문제)');
    /* 한번 더 클릭 — 닫혀야 함 */
    menuBtn.click();
    await tick(150);
    if (wrap && !wrap.classList.contains('menu-open')) pass('버튼 재클릭 → 드롭다운 닫힘 ✓ (토글 정상)');
    else fail('버튼 재클릭 → 드롭다운 닫히지 않음!');
  } else {
    fail('menuBtn 요소 없음 — 클릭 테스트 불가');
  }

  /* STEP 8: 외부 클릭 시 닫힘 확인 */
  info('STEP 8: 외부 클릭 시 닫힘 테스트');
  _openUserMenu(); // 먼저 열기
  await tick(100);
  document.body.dispatchEvent(new MouseEvent('click', { bubbles: true }));
  await tick(150);
  if (wrap && !wrap.classList.contains('menu-open')) pass('외부 클릭 → 드롭다운 자동 닫힘 ✓');
  else fail('외부 클릭 → 드롭다운 닫히지 않음!');

  /* STEP 9: CSS overflow 확인 */
  info('STEP 9: CSS header-inner overflow 확인');
  const headerInner = document.querySelector('.header-inner');
  if (headerInner) {
    const ov = getComputedStyle(headerInner).overflow;
    if (ov === 'visible' || ov === '') pass('header-inner overflow:' + ov + ' — 드롭다운 클리핑 없음 ✓');
    else fail('header-inner overflow:' + ov + ' — 드롭다운이 잘릴 수 있음! CSS 확인 필요');
  }

  /* 결과 요약 */
  await tick(200);
  const total = passCount + failCount;
  info('');
  log('══════════════════════════════════', 'warn');
  log('결과: ' + passCount + '/' + total + ' 통과' + (failCount === 0 ? ' — 모든 테스트 통과! 🎉' : ' — ' + failCount + '개 실패'), failCount === 0 ? 'ok' : 'err');
  log('══════════════════════════════════', 'warn');
  console.log('[auto-test] RESULT:', passCount + '/' + total, 'PASS,', failCount, 'FAIL');

  /* localStorage 정리 */
  localStorage.removeItem('sajuon_current_user');
  localStorage.removeItem('sajuon_points');
});

function tick(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
