function toAbsDay(y,m,d){
  if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524;
}

// KASI 춘절 + 윤달로 배열 구성
const fixed=[];
for(let i=0;i<=150;i++){
  const yr=1900+i;
  const kc=KASI_CHUNJOL[yr];
  const lm=KASI_LEAP[yr]||0;
  const ld=lm>0?(KASI_LEAP_DAYS[yr]||29):0;
  const m=[...MONTHS_ORIG[i]];
  fixed.push([kc[0],kc[1],lm,...m,ld]);
}

// 갭 계산
function getGap(i){
  const yr=1900+i,r=fixed[i],rn=fixed[i+1];
  const rg=toAbsDay(yr+1,rn[0],rn[1])-toAbsDay(yr,r[0],r[1]);
  const lm=r[2],ld=lm>0?r[15]:0;
  const db=r.slice(3,15).reduce((a,b)=>a+b,0)+ld;
  return{yr,db,rg,diff:db-rg};
}

// 월 일수 조정
for(let pass=0;pass<10;pass++){
  for(let i=0;i<fixed.length-1;i++){
    const{diff}=getGap(i);
    if(diff===0||Math.abs(diff)>5)continue;
    if(diff>0){for(let m=3;m<=14;m++){if(fixed[i][m]===30){fixed[i][m]=29;break;}}}
    else{for(let m=14;m>=3;m--){if(fixed[i][m]===29){fixed[i][m]=30;break;}}}
  }
}

  const{yr,diff}=getGap(i);
  if(diff!==0)errs.push({yr,diff});else ok++;
}

    `${p(r[15])},], // ${yr}${lnote}`
  );
});
lines.push('  ];');
