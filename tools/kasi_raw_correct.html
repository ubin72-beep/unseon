/* ── 갭 계산 ── */
function toAbsDay(y, m, d) {
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25*(y+4716)) + Math.floor(30.6001*(m+1)) + d + B - 1524;
}

/* ================================================================
   자동 교정 엔진
   전략:
   1) diff = -(29~31), 윤달=0  → 이 연도에 윤달 추가 (KASI 목록 기준)
   2) diff = +(29~31), 윤달=N  → 이 연도 윤달 제거, 전년도에 추가
   3) diff = ±1               → 가장 영향이 작은 월 일수 조정
   ================================================================ */

// deep copy
const fixed = raw.map(r => [...r]);

let log = '';
let nFixed = 0;

function getYearGap(i) {
  const year = 1900 + i;
  const r     = fixed[i];
  const rNext = fixed[i+1];
  const absThis = toAbsDay(year,    r[0],     r[1]);
  const absNext = toAbsDay(year+1, rNext[0], rNext[1]);
  const realGap = absNext - absThis;
  const leapMonth = r[2];
  const months    = r.slice(3,15);
  const leapDays  = leapMonth > 0 ? r[15] : 0;
  const dbSum     = months.reduce((a,b)=>a+b,0) + leapDays;
  return { year, dbSum, realGap, diff: dbSum - realGap, leapMonth, leapDays };
}

// KASI 공식 윤달 일수 (대부분 29일, 일부 30일)
const KASI_LEAP_DAYS = {
  1900:29, 1903:29, 1906:30, 1909:29, 1911:29,
  1914:30, 1917:29, 1919:29, 1922:29, 1925:29,
  1928:29, 1930:29, 1933:30, 1936:29, 1938:29,
  1941:30, 1944:30, 1947:29, 1949:29, 1952:29,
  1955:29, 1957:29, 1960:29, 1963:30, 1966:29,
  1968:29, 1971:30, 1974:29, 1976:30, 1979:29,
  1982:29, 1984:29, 1987:29, 1990:29, 1993:29,
  1995:29, 1998:30, 2001:29, 2004:29, 2006:29,
  2009:29, 2012:29, 2014:29, 2017:29, 2020:29,
  2023:29, 2025:29, 2028:29, 2031:29, 2033:30,
  2036:29, 2039:29, 2042:29, 2044:29, 2047:29,
  2050:29
};

// Pass 1: 큰 오류 (윤달 위치 교정)
for (let i = 0; i < fixed.length - 1; i++) {
  const { year, diff, leapMonth } = getYearGap(i);
  const correctLeap = KASI_LEAP[year] || 0;

  if (Math.abs(diff) >= 25) {
    if (diff < 0 && leapMonth === 0 && correctLeap > 0) {
      // 윤달 추가 필요
      const ld = KASI_LEAP_DAYS[year] || 29;
      fixed[i][2]  = correctLeap;
      fixed[i][15] = ld;
      log += `[추가] ${year}: 윤${correctLeap}월 ${ld}일 추가 (diff was ${diff})\n`;
      nFixed++;
    } else if (diff > 0 && leapMonth > 0 && correctLeap === 0) {
      // 윤달 제거 필요
      fixed[i][2]  = 0;
      fixed[i][15] = 0;
      log += `[제거] ${year}: 윤${leapMonth}월 제거 (diff was ${diff})\n`;
      nFixed++;
    } else if (diff > 0 && leapMonth > 0 && correctLeap !== leapMonth) {
      // 윤달 번호 교정
      fixed[i][2]  = correctLeap;
      fixed[i][15] = KASI_LEAP_DAYS[year] || 29;
      log += `[수정] ${year}: 윤달 ${leapMonth}월→${correctLeap}월 (diff was ${diff})\n`;
      nFixed++;
    }
  }
}

// Pass 2: 작은 오류 (±1~3, 월 일수 조정)
for (let pass = 0; pass < 5; pass++) {
  for (let i = 0; i < fixed.length - 1; i++) {
    const { year, diff } = getYearGap(i);
    if (diff === 0) continue;
    if (Math.abs(diff) >= 25) continue; // 큰 오류는 별도 처리

    // 가장 긴(또는 짧은) 월을 조정
    if (diff > 0) {
      // DB > 실갭: 한 달을 줄여야 함 (30→29)
      for (let m = 3; m <= 14; m++) {
        if (fixed[i][m] === 30) {
          fixed[i][m] = 29;
          log += `[월조정] ${year}: m${m-2} 30→29 (diff was ${diff})\n`;
          nFixed++;
          break;
        }
      }
    } else {
      // DB < 실갭: 한 달을 늘려야 함 (29→30)
      for (let m = 14; m >= 3; m--) {
        if (fixed[i][m] === 29) {
          fixed[i][m] = 30;
          log += `[월조정] ${year}: m${m-2} 29→30 (diff was ${diff})\n`;
          nFixed++;
          break;
        }
      }
    }
  }
}

// 최종 검증
const finalErrors = [];
for (let i = 0; i < fixed.length - 1; i++) {
  const { year, diff } = getYearGap(i);
  if (diff !== 0) finalErrors.push({ year, diff });
}

log += `\n── 교정 완료: ${nFixed}건 수정 ──\n`;
log += `잔여 오류: ${finalErrors.length}건\n`;
finalErrors.forEach(e => log += `  ❌ ${e.year}: diff=${e.diff}\n`);

document.getElementById('log').textContent = log;

// RAW 출력
const yearNames = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
let outStr = '// ── 교정된 KASI RAW 배열 ──\nconst raw = [\n';
fixed.forEach((r, i) => {
  const year = 1900 + i;
  const leapNote = r[2] > 0 ? ` 윤${r[2]}월${r[15]}일` : '';
  const cols = r.map((v,idx) => {
    if (idx <= 2) return String(v).padStart(2,' ');
    return String(v).padStart(2,' ');
  });
  outStr += `  [${cols.join(',')}], // ${year}${leapNote}\n`;
});
outStr += '];';
document.getElementById('out').textContent = outStr;

// 콘솔 출력
console.log('=== 자동 교정 결과 ===');
console.log(`수정건수: ${nFixed}`);
console.log(`잔여오류: ${finalErrors.length}건`);
finalErrors.forEach(e => console.log(`❌ ${e.year}: diff=${e.diff}`));
if (finalErrors.length === 0) console.log('✅ 오류 0건 완벽!');
</script>
