<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>잔여4건 수동분석</title></head>
<body>
<script>
function _toAbsDay(y, m, d) {
  const Y = m <= 2 ? y - 1 : y;
  const M = m <= 2 ? m + 12 : m;
  const A = Math.floor(Y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25*(Y+4716)) + Math.floor(30.6001*(M+1)) + d + B - 1524 - 2415051;
}

// 1930, 1976, 2022, 2033 에 대해
// 실제 춘절 갭 계산 → 윤달 필요 여부 확인
// 그 다음 어느 해에 윤달이 있어야 하는지 주변 ±2년 범위 확인

// KASI 춘절 데이터 (확인된 것들)
const springs = {
  1929: [2,10], 1930: [1,30], 1931: [2,17], 1932: [2,6],
  1975: [2,11], 1976: [1,31], 1977: [2,18], 1978: [2,7],
  2021: [2,12], 2022: [2,1],  2023: [1,22], 2024: [2,10],
  2032: [2,11], 2033: [1,31], 2034: [2,19], 2035: [2,8],
};

for (const [yr, sp] of Object.entries(springs)) {
  const y = parseInt(yr);
  if (!springs[y+1]) continue;
  const gap = _toAbsDay(y+1, springs[y+1][0], springs[y+1][1]) 
            - _toAbsDay(y,   sp[0], sp[1]);
  const type = gap >= 380 ? '윤년('+gap+')' : '평년('+gap+')';
  console.log(yr+'→'+(y+1)+': '+type);
}

// 수동 분석:
// 1930 갭 = 383 → 윤달 필요 (윤달없는 평년=354, 윤달있는 윤년=383~385)
// 현재 DB: 1930=[윤달없음, 355일], 1929=[윤8월30, 384일]
// 자동수정 후: 1929 윤달이 1930으로 이동 불가 (1929 갭=354 → 1929는 평년)
// → 1930 자체에 윤달이 필요, 그런데 1929도 확인:
//   1929 갭 = 354 → 평년

console.log('\n--- 1930 상세 ---');
const g1929 = _toAbsDay(1930,1,30) - _toAbsDay(1929,2,10);
const g1930 = _toAbsDay(1931,2,17) - _toAbsDay(1930,1,30);
const g1931 = _toAbsDay(1932,2,6)  - _toAbsDay(1931,2,17);
console.log('1929갭='+g1929+', 1930갭='+g1930+', 1931갭='+g1931);
// 1930이 383이면 윤달(383-354=29)이 필요
// 어느 월? → KASI 확인 필요
// 현재 DB 1930: [30,29,29,30,29,30,30,29,30,30,29,30] 합=354
// 383-354=29 → 윤달29일 추가
// KASI: 1930년 윤6월29일 (庚午년 윤6월)

console.log('\n--- 1976 상세 ---');
const g1975 = _toAbsDay(1976,1,31) - _toAbsDay(1975,2,11);
const g1976 = _toAbsDay(1977,2,18) - _toAbsDay(1976,1,31);
const g1977 = _toAbsDay(1978,2,7)  - _toAbsDay(1977,2,18);
console.log('1975갭='+g1975+', 1976갭='+g1976+', 1977갭='+g1977);
// 1976이 384이면 윤달 필요
// 현재 DB 1976: [30,29,30,29,30,29,30,29,30,30,29,29] 합=354
// 384-354=30 → 윤달30일
// KASI: 1976년 윤8월30일 (丙辰년 윤8월)

console.log('\n--- 2022 상세 ---');
const g2021 = _toAbsDay(2022,2,1)  - _toAbsDay(2021,2,12);
const g2022 = _toAbsDay(2023,1,22) - _toAbsDay(2022,2,1);
const g2023 = _toAbsDay(2024,2,10) - _toAbsDay(2023,1,22);
console.log('2021갭='+g2021+', 2022갭='+g2022+', 2023갭='+g2023);
// 2022갭=355 → 평년(355일 가능)
// 현재 자동수정 후 2022에 윤5월29일 있을 수 있음 → 확인
// 실제 KASI: 2023년은 윤2월30일, 2022년은 윤달없음
// 2022갭=355이면 평년355 가능

console.log('\n--- 2033 상세 ---');
const g2032 = _toAbsDay(2033,1,31) - _toAbsDay(2032,2,11);
const g2033 = _toAbsDay(2034,2,19) - _toAbsDay(2033,1,31);
const g2034 = _toAbsDay(2035,2,8)  - _toAbsDay(2034,2,19);
console.log('2032갭='+g2032+', 2033갭='+g2033+', 2034갭='+g2034);
// 2033이 384이면 윤달 필요
// KASI: 2033년은 윤11월30일? 아니면 2034?
// 확인 필요

// 확인: 각 연도의 정확한 윤달을 KASI 기준으로 찾기
// KASI 1930년: 경오(庚午)년 → 윤6월29일 확인됨
// KASI 1976년: 병진(丙辰)년 → 윤8월18일~10/14 = 윤8월
//   1976-8-8 춘절(음력8/1)=양력9/2, 음력8/30=10/1, 윤8/1=10/2, 윤8/30=10/31
//   → 윤달 추가 시 m8 이후 삽입
// KASI 2033년: 계축(癸丑)년 → 윤11월?

console.log('\n=== 결론 ===');
console.log('1930: 갭='+g1930+' → 윤달 필요 (KASI: 윤6월29일)');
console.log('1976: 갭='+g1976+' → 윤달 필요 (KASI: 윤8월30일)');
console.log('2022: 갭='+g2022+' → '+( g2022===355 ? '355일 평년 가능' : '이상'));
console.log('2033: 갭='+g2033+' → 윤달 필요 (KASI 확인 필요)');
</script>
</body></html>
