// 목적: 오류목록을 분석하여 어떤 수정이 필요한지 상세 출력

function _toAbsDay(y, m, d) {
  const Y = m <= 2 ? y - 1 : y;
  const M = m <= 2 ? m + 12 : m;
  const A = Math.floor(Y / 100);
  const B = 2 - A + Math.floor(A / 4);
  const jdn = Math.floor(365.25*(Y+4716)) + Math.floor(30.6001*(M+1)) + d + B - 1524;
  return jdn - 2415051;
}

// 검증
let lines = '=== 수정 후 재검증 ===\n오류연도:\n';
let errCnt = 0;
let okCnt = 0;
for(let i=0; i<RAW_KASI.length-1; i++){
  const r=RAW_KASI[i], nr=RAW_KASI[i+1];
  const y=r[0];
  const abs=_toAbsDay(y,r[1],r[2]);
  const nabs=_toAbsDay(nr[0],nr[1],nr[2]);
  const gap=nabs-abs;
  const dbt=r.slice(4,16).reduce((a,b)=>a+b,0)+(r[3]>0?r[16]:0);
  const diff=gap-dbt;
  if(diff!==0){
    lines += y+'| DB='+dbt+' 실갭='+gap+' diff='+diff+' leap='+r[3]+'('+r[16]+') m=['+r.slice(4,16).join(',')+'] next='+nr[0]+'/'+nr[1]+'/'+nr[2]+'\n';
    errCnt++;
  } else okCnt++;
}
lines += '\n정상: '+okCnt+', 오류: '+errCnt;

// 날짜 테스트
function solarToLunar(sy,sm,sd){
  for(let i=0;i<RAW_KASI.length-1;i++){
    const r=RAW_KASI[i],nr=RAW_KASI[i+1];
    const y=r[0];
    const chStart=_toAbsDay(y,r[1],r[2]);
    const chEnd=_toAbsDay(nr[0],nr[1],nr[2]);
    const target=_toAbsDay(sy,sm,sd);
    if(target<chStart||target>=chEnd) continue;
    let off=target-chStart;
    const lm=r[3],ld=r[3]>0?r[16]:0;
    for(let m=1;m<=12;m++){
      const days=r[3+m];
      if(off<days) return y+'년 '+m+'월 '+(off+1)+'일';
      off-=days;
      if(lm===m){if(off<ld) return y+'년 윤'+m+'월 '+(off+1)+'일'; off-=ld;}
    }
  }
  return '범위초과';
}

lines += '\n\n=== 날짜 검증 ===\n';
lines += '양력 1973-01-23 → 음력: ' + solarToLunar(1973,1,23) + '\n';
lines += '양력 1973-02-05 → 음력: ' + solarToLunar(1973,2,5) + '\n';
lines += '양력 1969-09-28 → 음력: ' + solarToLunar(1969,9,28) + '\n';
lines += '양력 2024-02-10 → 음력: ' + solarToLunar(2024,2,10) + '\n';
