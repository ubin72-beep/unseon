<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>KASI 음력 DB 자동교정</title></head>
<body><pre id="out"></pre>
<script>
/* =====================================================
   KASI 기준 정답 데이터
   출처: 한국천문연구원 생활천문관 + Gemini 교차검증
   형식: [춘절월, 춘절일, 윤달, m1~m12, 윤달일수]
   ===================================================== */

function _toAbsDay(y,m,d){
  const Y=m<=2?y-1:y, M=m<=2?m+12:m;
  const A=Math.floor(Y/100), B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(Y+4716))+Math.floor(30.6001*(M+1))+d+B-1524-2415051;
}

/*
  KASI 기준 춘절(음력 1/1 양력날짜) + 윤달 목록
  ─────────────────────────────────────────
  1900: 1/31, 윤8월
  1901: 2/19
  1902: 2/8
  1903: 1/29, 윤5월
  1904: 2/16
  1905: 2/4        ← 총355일 (12월=30)
  1906: 1/25, 윤4월 ← KASI: 윤4월 아님 → 윤2월 재확인
  ...

  갭 검증으로 올바른 월배열을 역산하는 방식 사용
*/

// 현재 saju.js RAW (오류 포함)
const RAW_ORIG = [
  [ 1,31, 8, 30,29,30,29,30,29,30,29,30,30,29,30, 29], // 1900
  [ 2,19, 0, 30,29,30,29,30,29,30,29,30,29,30,29,  0], // 1901
  [ 2, 8, 0, 30,29,30,29,30,29,30,29,30,29,30,30,  0], // 1902
  [ 1,29, 5, 30,29,30,29,29,30,29,30,29,30,30,29, 29], // 1903
  [ 2,16, 0, 30,30,29,30,29,29,30,29,29,30,29,30,  0], // 1904
  [ 2, 4, 0, 30,29,30,29,30,29,30,29,30,29,30,29,  0], // 1905 ❌+1
  [ 1,25, 2, 30,29,30,30,29,30,29,30,29,29,30,29, 30], // 1906
  [ 2,13, 0, 30,29,30,30,29,30,29,30,29,30,29,29,  0], // 1907
  [ 2, 2, 0, 30,29,30,29,30,29,30,29,30,29,30,29,  0], // 1908 ❌+1
  [ 1,22, 6, 30,29,30,29,30,29,30,30,29,30,29,30, 29], // 1909
  [ 2,10, 0, 29,30,29,29,30,29,30,30,29,30,30,29,  0], // 1910
  [ 1,30, 0, 30,29,30,29,29,30,29,30,29,30,30,29,  0], // 1911 ❌+30
  [ 2,18, 6, 30,29,30,29,29,30,29,29,30,30,29,30, 29], // 1912 ❌-29
  [ 2, 6, 0, 30,29,30,30,29,29,30,29,29,30,29,30,  0], // 1913
  [ 1,26, 0, 30,29,30,30,29,29,30,29,29,30,29,29,  0], // 1914 ❌+31
  [ 2,14, 5, 30,29,30,30,29,30,29,30,29,29,30,29, 30], // 1915 ❌-30
  [ 2, 3, 0, 30,29,30,30,29,30,29,30,29,30,29,30,  0], // 1916
  [ 1,23, 0, 30,29,29,30,30,29,29,30,30,29,30,29,  0], // 1917 ❌+30
  [ 2,11, 2, 30,29,29,30,30,29,29,30,29,30,30,29, 29], // 1918 ❌-28
  [ 2, 1, 0, 30,30,29,29,30,29,30,29,30,29,30,29,  0], // 1919 ❌+30
  [ 2,20, 0, 29,30,29,29,30,30,29,30,29,30,29,30,  0], // 1920
  [ 2, 8, 6, 29,30,29,29,30,30,29,30,29,30,30,29, 29], // 1921 ❌-29
  [ 1,28, 0, 30,29,30,29,30,29,30,29,30,30,29,30,  0], // 1922 ❌+29
  [ 2,16, 0, 29,30,29,30,29,30,29,29,30,29,30,30,  0], // 1923
  [ 2, 5, 5, 29,30,29,30,29,30,29,29,30,29,30,30, 29], // 1924 ❌-29
  [ 1,24, 0, 29,30,29,30,30,29,30,29,29,30,29,30,  0], // 1925 ❌+31
  [ 2,13, 0, 29,30,29,30,29,30,29,29,30,29,30,29,  0], // 1926 ❌+1
  [ 2, 2, 4, 30,29,30,30,29,30,29,30,29,29,30,29, 30], // 1927 ❌-29
  [ 1,23, 0, 30,29,30,30,29,30,30,29,30,29,30,29,  0], // 1928 ❌+29
  [ 2,10, 0, 29,30,29,30,29,30,30,29,30,29,30,29,  0], // 1929
  [ 1,30, 6, 30,29,29,30,29,30,30,29,30,30,29,30, 29], // 1930 ❌-1
];

// 갭 계산
function getGap(i) {
  const r = RAW_ORIG[i], nr = RAW_ORIG[i+1];
  return _toAbsDay(1901+i, nr[0], nr[1]) - _toAbsDay(1900+i, r[0], r[1]);
}
function getDB(r) {
  return r[3]+r[4]+r[5]+r[6]+r[7]+r[8]+r[9]+r[10]+r[11]+r[12]+r[13]+r[14] + (r[2]>0?r[15]:0);
}

let out = '';
for(let i=0;i<RAW_ORIG.length-1;i++){
  const y=1900+i, r=RAW_ORIG[i];
  const gap=getGap(i), dbt=getDB(r), diff=gap-dbt;
  const msum = r[3]+r[4]+r[5]+r[6]+r[7]+r[8]+r[9]+r[10]+r[11]+r[12]+r[13]+r[14];
  if(diff!==0){
    out += `❌ ${y}: diff=${diff} | 갭=${gap} | DB합=${dbt} | 윤달=${r[2]}월(${r[15]}일)\n`;
    out += `   월배열: [${r.slice(3,15)}] 합=${msum}\n`;
    // 교정 힌트
    if(diff>0 && r[2]===0){
      out += `   → 이 연도에 윤달 ${diff}일 필요하거나, 특정 월 일수 +${diff}\n`;
    } else if(diff>0 && r[2]>0){
      out += `   → 윤달일수 +${diff} 필요 또는 특정 월 일수 조정\n`;
    } else if(diff<0 && r[2]>0){
      out += `   → 이 연도 윤달 제거하고 앞 연도로 이동? (diff=${diff})\n`;
    }
    out += '\n';
  }
}
document.getElementById('out').textContent = out;
console.log(out);

// 핵심 패턴 요약
console.log("=== 오류 패턴 요약 ===");
const patterns = {};
for(let i=0;i<RAW_ORIG.length-1;i++){
  const r=RAW_ORIG[i];
  const gap=getGap(i), diff=gap-getDB(r);
  if(diff!==0){
    const key = diff>25?'윤달누락(+30)': diff<-25?'윤달초과(-29)': diff>0?`+${diff}일`: `${diff}일`;
    patterns[key] = (patterns[key]||0)+1;
  }
}
console.log(JSON.stringify(patterns,null,2));
</script>
</body></html>
