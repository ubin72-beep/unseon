/* ── 갭(gap) 계산: 양력 절대일 차이 ── */
function toAbsDay(y, m, d) {
  // 율리우스/그레고리력 절대일 (JDN 기반)
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524;
}

const errors = [];
const oks    = [];

for (let i = 0; i < raw.length - 1; i++) {
  const year  = 1900 + i;
  const r     = raw[i];
  const rNext = raw[i + 1];

  // 이번 해 춘절 → 다음 해 춘절 실제 갭
  const [cm, cd] = [r[0], r[1]];
  const [nm, nd] = [rNext[0], rNext[1]];
  // 연도 주의: 춘절이 1월이면 다음해 1월, 2월이면 다음해 2월
  // 다음해 = year+1
  const absThis = toAbsDay(year, cm, cd);
  const absNext = toAbsDay(year + 1, nm, nd);
  const realGap = absNext - absThis;

  // DB 합산
  const leapMonth = r[2];
  const months    = r.slice(3, 15);   // m1~m12
  const leapDays  = leapMonth > 0 ? r[15] : 0;
  const dbSum     = months.reduce((a, b) => a + b, 0) + leapDays;

  const diff = dbSum - realGap;

  if (diff !== 0) {
    errors.push({ year, dbSum, realGap, diff, leapMonth, leapDays, months });
  } else {
    oks.push(year);
  }
}

  html += '<span class="ok">🎉 모든 데이터 정확! 오류 0건</span>\n';

  html += ' 연도  | DB합  |실갭  |diff | 윤달 | 윤일 | 월배열\n';
  html += '─────────────────────────────────────────────────────────────────\n';
  errors.forEach(e => {
    const mArr = e.months.join(',');
    const flag = e.diff > 0 ? '🔺' : '🔻';
    html += `<span class="err">${e.year} | ${String(e.dbSum).padStart(3)} | ${String(e.realGap).padStart(3)} | ${flag}${String(e.diff).padStart(3)} | 윤${e.leapMonth}월 | ${e.leapDays}일 | [${mArr}]</span>\n`;
  });
  html += '\n';

  // 패턴 분석
  html += '<span class="warn">── 오류 패턴 분석 ──</span>\n';
  const big  = errors.filter(e => Math.abs(e.diff) >= 25);
  const small = errors.filter(e => Math.abs(e.diff) < 25 && Math.abs(e.diff) > 0);
  html += `<span class="warn">  큰 오류(±25 이상, 윤달 관련): ${big.length}건  →  ${big.map(e=>e.year).join(', ')}</span>\n`;
  html += `<span class="warn">  작은 오류(±1~24, 일수 오차):  ${small.length}건  →  ${small.map(e=>e.year).join(', ')}</span>\n`;
}
