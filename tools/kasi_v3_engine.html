  if (m <= 2) { y -= 1; m += 12; }

  const B = 2 - A + Math.floor(A / 4);

  newRow[0] = kc[0];
  newRow[1] = kc[1];
  return newRow;
});

/* ── Step 2: 윤달 위치를 KASI 공식으로 교체 ── */
for (let i = 0; i < fixed.length; i++) {
  const yr = 1900 + i;
  const cl = KASI_LEAP[yr] || 0;
  const cld = cl > 0 ? (KASI_LEAP_DAYS[yr] || 29) : 0;
  fixed[i][2]  = cl;
  fixed[i][15] = cld;
}

/* ── Step 3: 갭 계산 함수 ── */
function getGap(i) {
  const yr = 1900 + i;
  const r = fixed[i], rn = fixed[i + 1];
  const realGap = toAbsDay(yr + 1, rn[0], rn[1]) - toAbsDay(yr, r[0], r[1]);
  const lm = r[2], ld = lm > 0 ? r[15] : 0;
  const dbSum = r.slice(3, 15).reduce((a, b) => a + b, 0) + ld;
  return { yr, dbSum, realGap, diff: dbSum - realGap, lm };
}

/* ── Step 4: 월 일수 자동 조정 (±1 반복) ── */
let logStr = '=== 월 일수 자동 조정 로그 ===\n';
for (let pass = 0; pass < 10; pass++) {
  let changed = false;
  for (let i = 0; i < fixed.length - 1; i++) {
    const { yr, diff, lm } = getGap(i);
    if (diff === 0) continue;
    if (Math.abs(diff) > 5) {
      logStr += `⚠️ ${yr}: diff=${diff} 큰 오류! 윤달 문제 가능\n`;
      continue;
    }
    if (diff > 0) {
      // DB가 크다 → 달 중 하나를 30→29로 줄임
      for (let m = 3; m <= 14; m++) {
        if (fixed[i][m] === 30) {
          fixed[i][m] = 29;
          changed = true;
          break;
        }
      }
    } else {
      // DB가 작다 → 달 중 하나를 29→30으로 늘림
      for (let m = 14; m >= 3; m--) {
        if (fixed[i][m] === 29) {
          fixed[i][m] = 30;
          changed = true;
          break;
        }
      }
    }
  }
  if (!changed) break;
}

/* ── 최종 검증 ── */
let ok = 0, errs = [];
for (let i = 0; i < fixed.length - 1; i++) {
  const { yr, diff } = getGap(i);
  if (diff !== 0) errs.push({ yr, diff });
  else ok++;
}

/* ── 결과 출력 ── */
document.getElementById('stat').textContent =
  `✅ 정상: ${ok}건 | ❌ 잔여오류: ${errs.length}건 ${errs.length === 0 ? '🎉 완벽!' : ''}`;
document.getElementById('log').textContent = logStr + '\n잔여오류:\n' +
  errs.map(e => `❌ ${e.yr}: diff=${e.diff}`).join('\n');

/* ── saju.js용 raw 배열 생성 ── */
const lines = [];
lines.push('  const raw = [');
fixed.forEach((r, i) => {
  const yr = 1900 + i;
  const note = r[2] > 0 ? ` 윤${r[2]}월${r[15]}일` : '';
  const p = n => String(n).padStart(2, ' ');
  lines.push(
    `    [${p(r[0])},${p(r[1])},${p(r[2])},` +
    ` ${p(r[3])},${p(r[4])},${p(r[5])},${p(r[6])},${p(r[7])},${p(r[8])},` +
    `${p(r[9])},${p(r[10])},${p(r[11])},${p(r[12])},${p(r[13])},${p(r[14])},${p(r[15])}], // ${yr}${note}`
  );
});
lines.push('  ];');
document.getElementById('out').value = lines.join('\n');

console.log(`정상: ${ok}건, 오류: ${errs.length}건`);
errs.forEach(e => console.log(`❌ ${e.yr}: diff=${e.diff}`));
if (errs.length === 0) console.log('✅ 완벽!');
</script>
</body>
