function _toAbsDay(y, m, d) {
  const Y = m <= 2 ? y - 1 : y;
  const M = m <= 2 ? m + 12 : m;
  const A = Math.floor(Y / 100);
  const B = 2 - A + Math.floor(A / 4);
  const jdn = Math.floor(365.25*(Y+4716)) + Math.floor(30.6001*(M+1)) + d + B - 1524;
  return jdn - 2415051;
}

function calcDiff(r, nr) {
  const gap = _toAbsDay(nr[0],nr[1],nr[2]) - _toAbsDay(r[0],r[1],r[2]);
  const dbt = r.slice(4,16).reduce((a,b)=>a+b,0) + (r[3]>0 ? r[16] : 0);
  return gap - dbt;
}

function cloneRaw(raw) { return raw.map(r => r.slice()); }

const FIXED = cloneRaw(RAW);
const log = [];

// 윤달 이동형 수정 (5패스)
for (let pass = 0; pass < 5; pass++) {
  let changed = false;
  for (let i = 0; i < FIXED.length - 1; i++) {
    const r = FIXED[i], nr = FIXED[i+1];
    const diff = calcDiff(r, nr);
    if (diff === 0) continue;
    const leapDays = r[3] > 0 ? r[16] : 0;
    const nextLeapDays = nr[3] > 0 ? nr[16] : 0;
    if (r[3] > 0 && Math.abs(diff + leapDays) <= 1 && nr[3] === 0) {
      const lm = r[3], ld = r[16];
      FIXED[i][3] = 0; FIXED[i][16] = 0;
      FIXED[i+1][3] = lm; FIXED[i+1][16] = ld;
      log.push('윤달이동: '+r[0]+'→'+nr[0]+' 윤'+lm+'('+ld+')');
      changed = true;
    } else if (nr[3] > 0 && Math.abs(diff - nextLeapDays) <= 1 && r[3] === 0) {
      const lm = nr[3], ld = nr[16];
      FIXED[i][3] = lm; FIXED[i][16] = ld;
      FIXED[i+1][3] = 0; FIXED[i+1][16] = 0;
      log.push('윤달역이동: '+nr[0]+'→'+r[0]+' 윤'+lm+'('+ld+')');
      changed = true;
    }
  }
  if (!changed) break;
}

// ±1 오차 수정
for (let i = 0; i < FIXED.length - 1; i++) {
  let diff = calcDiff(FIXED[i], FIXED[i+1]);
  if (diff === 0) continue;
  if (Math.abs(diff) <= 2) {
    let toFix = diff;
    for (let mi = 4; mi <= 15 && toFix !== 0; mi++) {
      if (toFix > 0 && FIXED[i][mi] === 29) { FIXED[i][mi] = 30; toFix--; }
      else if (toFix < 0 && FIXED[i][mi] === 30) { FIXED[i][mi] = 29; toFix++; }
    }
  }
}

// 최종 검증
let errCnt = 0, okCnt = 0, errList = [];
for (let i = 0; i < FIXED.length - 1; i++) {
  const diff = calcDiff(FIXED[i], FIXED[i+1]);
  if (diff !== 0) { errList.push(FIXED[i][0]+':'+diff); errCnt++; } else okCnt++;
}

// 날짜 테스트
function solarToLunar(data, sy, sm, sd) {
  for (let i = 0; i < data.length-1; i++) {
    const r = data[i], nr = data[i+1];
    const chStart = _toAbsDay(r[0],r[1],r[2]);
    const chEnd   = _toAbsDay(nr[0],nr[1],nr[2]);
    const target  = _toAbsDay(sy,sm,sd);
    if (target < chStart || target >= chEnd) continue;
    let off = target - chStart;
    for (let m = 1; m <= 12; m++) {
      const days = r[m+3];
      if (off < days) return r[0]+'년 '+m+'월 '+(off+1)+'일';
      off -= days;
      if (r[3] === m) { if (off < r[16]) return r[0]+'년 윤'+m+'월 '+(off+1)+'일'; off -= r[16]; }
    }
  }
  return '범위초과';
}
