<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><title>saju.js 최종 교정 데이터 생성기</title>
<style>
body{font-family:monospace;font-size:11px;padding:16px;background:#111;color:#eee}
.ok{color:#4f4}.err{color:#f44}.info{color:#8af}
textarea{width:100%;height:78vh;background:#000;color:#9f9;font-family:monospace;font-size:11px;border:1px solid #444;padding:8px}

<body>
<h2 id="stat" class="info">계산 중...</h2>
<textarea id="out"></textarea>
<script>
/* ================================================================
   KASI 공식 음력 설날 양력 날짜
   ================================================================ */
const CJ={
  1900:[1,31],1901:[2,19],1902:[2,8],1903:[1,29],1904:[2,16],
  1905:[2,4],1906:[1,25],1907:[2,13],1908:[2,2],1909:[1,22],
  1910:[2,10],1911:[1,30],1912:[2,18],1913:[2,6],1914:[1,26],
  1915:[2,14],1916:[2,3],1917:[1,23],1918:[2,11],1919:[2,1],
  1920:[2,20],1921:[2,8],1922:[1,28],1923:[2,16],1924:[2,5],
  1925:[1,24],1926:[2,13],1927:[2,2],1928:[1,23],1929:[2,10],
  1930:[1,30],1931:[2,17],1932:[2,6],1933:[1,26],1934:[2,14],
  1935:[2,4],1936:[1,24],1937:[2,11],1938:[1,31],1939:[2,19],
  1940:[2,8],1941:[1,27],1942:[2,15],1943:[2,5],1944:[1,25],
  1945:[2,13],1946:[2,2],1947:[1,22],1948:[2,10],1949:[1,29],
  1950:[2,17],1951:[2,6],1952:[1,27],1953:[2,14],1954:[2,3],
  1955:[1,24],1956:[2,12],1957:[1,31],1958:[2,18],1959:[2,8],
  1960:[1,28],1961:[2,15],1962:[2,5],1963:[1,25],1964:[2,13],
  1965:[2,2],1966:[1,21],1967:[2,9],1968:[1,30],1969:[2,17],
  1970:[2,6],1971:[1,27],1972:[2,15],1973:[2,3],1974:[1,23],
  1975:[2,11],1976:[1,31],1977:[2,18],1978:[2,7],1979:[1,28],
  1980:[2,16],1981:[2,5],1982:[1,25],1983:[2,13],1984:[2,2],
  1985:[2,20],1986:[2,9],1987:[1,29],1988:[2,17],1989:[2,6],
  1990:[1,27],1991:[2,15],1992:[2,4],1993:[1,23],1994:[2,10],
  1995:[1,31],1996:[2,19],1997:[2,7],1998:[1,28],1999:[2,16],
  2000:[2,5],2001:[1,24],2002:[2,12],2003:[2,1],2004:[1,22],
  2005:[2,9],2006:[1,29],2007:[2,18],2008:[2,7],2009:[1,26],
  2010:[2,14],2011:[2,3],2012:[1,23],2013:[2,10],2014:[1,31],
  2015:[2,19],2016:[2,8],2017:[1,28],2018:[2,16],2019:[2,5],
  2020:[1,25],2021:[2,12],2022:[2,1],2023:[1,22],2024:[2,10],
  2025:[1,29],2026:[2,17],2027:[2,6],2028:[1,26],2029:[2,13],
  2030:[2,3],2031:[1,23],2032:[2,11],2033:[1,31],2034:[2,19],
  2035:[2,8],2036:[1,28],2037:[2,15],2038:[2,4],2039:[1,24],
  2040:[2,12],2041:[2,1],2042:[1,22],2043:[2,9],2044:[1,30],
  2045:[2,17],2046:[2,6],2047:[1,26],2048:[2,14],2049:[2,2],
  2050:[1,23]
};

/* KASI 공식 윤달 */
const LM={
  1900:8,1903:5,1906:4,1909:2,1911:6,1914:5,1917:2,1919:7,1922:12,1925:4,
  1928:2,1930:6,1933:5,1936:3,1938:7,1941:6,1944:4,1947:2,1949:7,1952:5,
  1955:3,1957:8,1960:6,1963:4,1966:3,1968:7,1971:5,1974:4,1976:8,1979:6,
  1982:4,1984:10,1987:6,1990:5,1993:3,1995:8,1998:5,2001:4,2004:2,2006:7,
  2009:5,2012:4,2014:9,2017:6,2020:4,2023:2,2025:6,2028:5,2031:3,2033:11,
  2036:6,2039:11,2042:2,2044:7,2047:5,2050:3
};

/* KASI 공식 윤달 일수 */
const LD={
  1900:29,1903:29,1906:30,1909:29,1911:29,1914:30,1917:29,1919:29,
  1922:29,1925:29,1928:29,1930:29,1933:30,1936:29,1938:29,1941:30,
  1944:30,1947:29,1949:29,1952:29,1955:29,1957:29,1960:29,1963:30,
  1966:29,1968:29,1971:30,1974:29,1976:30,1979:29,1982:29,1984:29,
  1987:29,1990:29,1993:29,1995:29,1998:30,2001:29,2004:29,2006:29,
  2009:29,2012:29,2014:29,2017:29,2020:29,2023:29,2025:29,2028:29,
  2031:29,2033:30,2036:29,2039:29,2042:29,2044:29,2047:29,2050:29
};

function toAbsDay(y,m,d){
  if(m<=2){y--;m+=12;}
  const A=Math.floor(y/100),B=2-A+Math.floor(A/4);
  return Math.floor(365.25*(y+4716))+Math.floor(30.6001*(m+1))+d+B-1524;
}

/* ─── 각 연도 실제 갭 계산 ─── */
function realGap(yr){
  const c=CJ[yr],n=CJ[yr+1];
  if(!c||!n) return 354; // 2050년 마지막은 갭 불필요
  return toAbsDay(yr+1,n[0],n[1])-toAbsDay(yr,c[0],c[1]);
}

/* ─── 각 연도 필요한 월합 ─── */
// 필요 월합 = 실갭 - 윤달일수
function neededMonthSum(yr){
  const lm=LM[yr]||0,ld=lm>0?(LD[yr]||29):0;
  return realGap(yr)-ld;
}

/* ─── 각 연도 월 배열 생성 ─── */
// 음력은 보통 29일(소) / 30일(대) 교대
// 실제 달 순서는 추산 필요 → 갭에 맞게 자동 생성
function buildMonths(yr){
  const needed=neededMonthSum(yr);
  // 기본 패턴: 30,29 교대
  const m=[30,29,30,29,30,29,30,29,30,29,30,29]; // 총 354
  const deficit=needed-354; // 얼마나 더 필요한가 (+면 30일 달 더, -면 29일 달 더)
  // deficit 범위: 보통 0~1 (354 또는 355일짜리 해)
  if(deficit>0){
    // 29→30으로 전환 (뒤에서부터)
    let cnt=deficit;
    for(let i=11;i>=0&&cnt>0;i--){if(m[i]===29){m[i]=30;cnt--;}}
  } else if(deficit<0){
    // 30→29로 전환
    let cnt=-deficit;
    for(let i=11;i>=0&&cnt>0;i--){if(m[i]===30){m[i]=29;cnt--;}}
  }
  return m;
}

/* ─── RAW 배열 생성 및 검증 ─── */
const rows=[];
let ok=0,errs=[];
for(let yr=1900;yr<=2050;yr++){
  const c=CJ[yr];
  if(!c){console.error('CJ 없음:',yr);continue;}
  const lm=LM[yr]||0;
  const ld=lm>0?(LD[yr]||29):0;
  const m=buildMonths(yr);
  rows.push([c[0],c[1],lm,...m,ld]);
}

// 검증
for(let i=0;i<rows.length-1;i++){
  const yr=1900+i;
  if(yr>=2050)break;
  const r=rows[i],rn=rows[i+1];
  if(!r||!rn){console.error('rows없음',yr);continue;}
  const rg=toAbsDay(yr+1,rn[0],rn[1])-toAbsDay(yr,r[0],r[1]);
  const lm=r[2],ld_=lm>0?r[15]:0;
  const db=r.slice(3,15).reduce((a,b)=>a+b,0)+ld_;
  if(db!==rg)errs.push({yr,db,rg,diff:db-rg});
  else ok++;
}

const stat=`정상:${ok}건 오류:${errs.length}건 ${errs.length===0?'🎉 완벽!':''}`;
document.getElementById('stat').textContent=stat;

// saju.js 출력
const lines=['  const raw = ['];
rows.forEach((r,i)=>{
  const yr=1900+i;
  const note=r[2]>0?` 윤${r[2]}월${r[15]}일`:'';
  const p=n=>String(n).padStart(2,' ');
  lines.push(
    `    [${p(r[0])},${p(r[1])},${p(r[2])}, ${p(r[3])},${p(r[4])},${p(r[5])},${p(r[6])},${p(r[7])},${p(r[8])},${p(r[9])},${p(r[10])},${p(r[11])},${p(r[12])},${p(r[13])},${p(r[14])}, ${p(r[15])},], // ${yr}${note}`
  );
});
lines.push('  ];');
document.getElementById('out').value=lines.join('\n');

console.log(stat);
errs.forEach(e=>console.log(`❌${e.yr}:diff=${e.diff}`));
if(errs.length===0)console.log('✅완벽');
</script>
</body>
</html>
