function toAbsDay(y, m, d) {
  if (m <= 2) { y -= 1; m += 12; }
  const A = Math.floor(y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25*(y+4716)) + Math.floor(30.6001*(m+1)) + d + B - 1524;
}

const fixed = RAW_ORIG.map(r => [...r]);

function getGap(i) {
  const y=1900+i, r=fixed[i], rn=fixed[i+1];
  const realGap = toAbsDay(y+1,rn[0],rn[1]) - toAbsDay(y,r[0],r[1]);
  const lm=r[2], ld=lm>0?r[15]:0;
  const dbSum=r.slice(3,15).reduce((a,b)=>a+b,0)+ld;
  return {y,dbSum,realGap,diff:dbSum-realGap,lm};
}

// Pass 1: 윤달 위치 교정
for(let i=0;i<fixed.length-1;i++){
  const {y,diff,lm}=getGap(i);
  const cl=KASI_LEAP[y]||0;
  if(Math.abs(diff)>=25){
    if(diff<0&&lm===0&&cl>0){
      fixed[i][2]=cl; fixed[i][15]=KASI_LEAP_DAYS[y]||29;
    } else if(diff>0&&lm>0&&cl===0){
      fixed[i][2]=0; fixed[i][15]=0;
    } else if(diff>0&&lm>0&&cl!==lm){
      fixed[i][2]=cl; fixed[i][15]=KASI_LEAP_DAYS[y]||29;
    }
  }
}

// Pass 2~6: 월 일수 미세 조정 (±1)
for(let pass=0;pass<6;pass++){
  for(let i=0;i<fixed.length-1;i++){
    const {diff}=getGap(i);
    if(diff===0||Math.abs(diff)>=25) continue;
    if(diff>0){
      for(let m=3;m<=14;m++){if(fixed[i][m]===30){fixed[i][m]=29;break;}}
    } else {
      for(let m=14;m>=3;m--){if(fixed[i][m]===29){fixed[i][m]=30;break;}}
    }
  }
}

let errs=[], oks=0;

  const {y,diff}=getGap(i);
  if(diff!==0) errs.push({y,diff}); else oks++;
}

    p(r[9]),p(r[10]),p(r[11]),p(r[12]),p(r[13]),p(r[14]),
    p(r[15])];
  lines.push(`    [${arr.join(',')}], ${note}`);
