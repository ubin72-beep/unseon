function _toAbsDay(y, m, d) {
  const Y = m <= 2 ? y - 1 : y;
  const M = m <= 2 ? m + 12 : m;
  const A = Math.floor(Y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25*(Y+4716)) + Math.floor(30.6001*(M+1)) + d + B - 1524 - 2415051;
}

function calcDiff(r, nr) {
  const gap = _toAbsDay(nr[0],nr[1],nr[2]) - _toAbsDay(r[0],r[1],r[2]);
  const dbt = r.slice(4,16).reduce((a,b)=>a+b,0) + (r[3]>0?r[16]:0);
  return gap - dbt;
}

// 월합+윤달=355 → 갭=355

// 검증
let ok=0, err=0, errList=[];
for(let i=0;i<RAW.length-1;i++){
  const d=calcDiff(RAW[i],RAW[i+1]);
  if(d!==0){err++;errList.push(RAW[i][0]+':'+d);}
  else ok++;
}
console.log('=최종검증= 정상:'+ok+' 오류:'+err+(err?(' ['+errList.join(',')+']'):''));

// 날짜 테스트
function s2l(sy,sm,sd){
  for(let i=0;i<RAW.length-1;i++){
    const r=RAW[i],nr=RAW[i+1];
    const cs=_toAbsDay(r[0],r[1],r[2]),ce=_toAbsDay(nr[0],nr[1],nr[2]);
    const t=_toAbsDay(sy,sm,sd);
    if(t<cs||t>=ce) continue;
    let off=t-cs;
    for(let m=1;m<=12;m++){
      const d=r[m+3];
      if(off<d) return r[0]+'년 '+m+'월 '+(off+1)+'일';
      off-=d;
      if(r[3]===m){if(off<r[16]) return r[0]+'년 윤'+m+'월 '+(off+1)+'일'; off-=r[16];}
    }
  }
  return '범위초과';
}
