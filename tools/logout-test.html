<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>лЎңк·ём•„мӣғ лІ„нҠј л””лІ„к·ё н…ҢмҠӨнҠё</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
.log { background: #1a1a1a; color: #0f0; padding: 16px; border-radius: 8px; font-size: 0.85rem; line-height: 1.8; margin-top: 20px; height: 300px; overflow-y: auto; }
.log .err { color: #ff5252; }
.log .ok  { color: #69f0ae; }
.log .warn{ color: #ffd740; }
button { padding: 10px 20px; margin: 6px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9rem; }
.btn-primary { background: #2c5f4f; color: #fff; }
.btn-danger  { background: #c62828; color: #fff; }
.result-box  { background: #fff; border: 2px solid #ddd; border-radius: 10px; padding: 16px; margin-top: 16px; }
</style>
</head>
<body>

<h2>рҹ”§ лЎңк·ём•„мӣғ лІ„нҠј л””лІ„к·ё</h2>

<div class="result-box">
  <h3>1. localStorage мғҒнғң</h3>
  <div id="lsStatus">нҷ•мқё мӨ‘...</div>
</div>

<div class="result-box">
  <h3>2. лІ„нҠј м§Ғм ‘ н…ҢмҠӨнҠё</h3>
  <button class="btn-primary" onclick="testMenuOpen()">в–¶ л“ңлЎӯлӢӨмҡҙ м—ҙкё° (_openUserMenu)</button>
  <button class="btn-primary" onclick="testToggle()">в–¶ toggleUserMenu() нҳём¶ң</button>
  <button class="btn-danger"  onclick="testLogout()">в–¶ handleLogout() м§Ғм ‘ нҳём¶ң</button>
  <button onclick="testWindowLogout()">в–¶ window.logout() нҳём¶ң</button>
</div>

<div class="result-box">
  <h3>3. DOM мғҒнғң</h3>
  <div id="domStatus">нҷ•мқё мӨ‘...</div>
</div>

<div class="result-box">
  <h3>4. мқҙлІӨнҠё лҰ¬мҠӨл„Ҳ нҷ•мқё</h3>
  <div id="listenerStatus">нҷ•мқё мӨ‘...</div>
</div>

<div class="log" id="logBox">лЎңк·ё мӢңмһ‘...<br/></div>

<script src="../js/auth.js?v=20260514a"></script>
<script>
const logBox = document.getElementById('logBox');
function log(msg, type='') {
  const d = document.createElement('div');
  d.className = type;
  d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  logBox.appendChild(d);
  logBox.scrollTop = logBox.scrollHeight;
}

// 1. localStorage мғҒнғң нҷ•мқё
function checkLS() {
  const user = localStorage.getItem('sajuon_current_user');
  const pts  = localStorage.getItem('sajuon_points');
  console.log('[logout-test] localStorage user:', user ? JSON.parse(user).name : 'null');
  const el   = document.getElementById('lsStatus');
  if (user) {
    try {
      const u = JSON.parse(user);
      el.innerHTML = `<span style="color:green">вң… лЎңк·ёмқё мғҒнғң</span><br>
        мқҙлҰ„: <b>${u.name || 'м—ҶмқҢ'}</b><br>
        мқҙл©”мқј: <b>${u.email || 'м—ҶмқҢ'}</b><br>
        ID: <b>${u.id || 'м—ҶмқҢ'}</b><br>
        нҸ¬мқёнҠё: <b>${pts || '0'}P</b>`;
      log('лЎңк·ёмқё мӮ¬мҡ©мһҗ: ' + u.name + ' / ' + u.email, 'ok');
    } catch(e) {
      el.innerHTML = '<span style="color:red">вқҢ localStorage нҢҢмӢұ мҳӨлҘҳ: ' + e.message + '</span>';
      log('localStorage нҢҢмӢұ мҳӨлҘҳ: ' + e.message, 'err');
    }
  } else {
    el.innerHTML = '<span style="color:orange">вҡ пёҸ л№„лЎңк·ёмқё мғҒнғң (localStorageм—җ мӮ¬мҡ©мһҗ м—ҶмқҢ)</span>';
    log('л№„лЎңк·ёмқё мғҒнғң', 'warn');
  }
}

// 3. DOM мғҒнғң нҷ•мқё
function checkDOM() {
  const wrap    = document.getElementById('userMenuWrap');
  const dd      = document.getElementById('userDropdown');
  const menuBtn = document.querySelector('.user-menu-btn, #userMenuBtn');
  const logBtn  = document.querySelector('.user-logout-btn, #userLogoutBtn');
  const el      = document.getElementById('domStatus');

  let html = '';
  html += wrap    ? `вң… #userMenuWrap мЎҙмһ¬ (display: ${wrap.style.display || 'cssкё°ліё'})<br>` 
                  : `вқҢ #userMenuWrap <b>м—ҶмқҢ</b><br>`;
  html += dd      ? `вң… #userDropdown мЎҙмһ¬ (display: ${dd.style.display || 'cssкё°ліё'})<br>`
                  : `вқҢ #userDropdown <b>м—ҶмқҢ</b><br>`;
  html += menuBtn ? `вң… .user-menu-btn мЎҙмһ¬<br>` : `вқҢ .user-menu-btn <b>м—ҶмқҢ</b><br>`;
  html += logBtn  ? `вң… .user-logout-btn мЎҙмһ¬<br>` : `вқҢ .user-logout-btn <b>м—ҶмқҢ</b><br>`;
  el.innerHTML = html;

  log('DOM: wrap=' + !!wrap + ', dropdown=' + !!dd + ', menuBtn=' + !!menuBtn + ', logoutBtn=' + !!logBtn);
}

// 4. мқҙлІӨнҠё лҰ¬мҠӨл„Ҳ / м „м—ӯ н•ЁмҲҳ нҷ•мқё
function checkListeners() {
  const el = document.getElementById('listenerStatus');
  let html = '';
  html += typeof window.logout        === 'function' ? 'вң… window.logout м •мқҳлҗЁ<br>'       : 'вқҢ window.logout <b>м—ҶмқҢ</b><br>';
  html += typeof window.handleLogout  === 'function' ? 'вң… window.handleLogout м •мқҳлҗЁ<br>' : 'вқҢ handleLogout <b>м—ҶмқҢ</b><br>';
  html += typeof window.toggleUserMenu=== 'function' ? 'вң… window.toggleUserMenu м •мқҳлҗЁ<br>': 'вқҢ toggleUserMenu <b>м—ҶмқҢ</b><br>';
  html += typeof window._openUserMenu === 'function' ? 'вң… window._openUserMenu м •мқҳлҗЁ<br>' : 'вқҢ _openUserMenu <b>м—ҶмқҢ</b><br>';
  html += typeof window.initAuthHeader=== 'function' ? 'вң… window.initAuthHeader м •мқҳлҗЁ<br>': 'вқҢ initAuthHeader <b>м—ҶмқҢ</b><br>';
  el.innerHTML = html;
  console.log('[logout-test] window.logout:', typeof window.logout);
  console.log('[logout-test] window.toggleUserMenu:', typeof window.toggleUserMenu);
  console.log('[logout-test] window._openUserMenu:', typeof window._openUserMenu);
  console.log('[logout-test] window.initAuthHeader:', typeof window.initAuthHeader);
  log('м „м—ӯн•ЁмҲҳ: logout=' + typeof window.logout + ', toggleUserMenu=' + typeof window.toggleUserMenu);
}

// н…ҢмҠӨнҠё н•ЁмҲҳл“Ө
function testMenuOpen() {
  log('в–¶ _openUserMenu() нҳём¶ң мӢңлҸ„');
  if (typeof _openUserMenu === 'function') {
    _openUserMenu();
    log('вң… _openUserMenu() нҳём¶ң мҷ„лЈҢ', 'ok');
  } else {
    log('вқҢ _openUserMenu н•ЁмҲҳ м—ҶмқҢ', 'err');
  }
  checkDOM();
}
function testToggle() {
  log('в–¶ toggleUserMenu() нҳём¶ң мӢңлҸ„');
  if (typeof toggleUserMenu === 'function') {
    toggleUserMenu(null);
    log('вң… toggleUserMenu() нҳём¶ң мҷ„лЈҢ', 'ok');
  } else {
    log('вқҢ toggleUserMenu н•ЁмҲҳ м—ҶмқҢ', 'err');
  }
  checkDOM();
}
function testLogout() {
  log('в–¶ handleLogout() м§Ғм ‘ нҳём¶ң мӢңлҸ„');
  if (typeof handleLogout === 'function') {
    log('вң… handleLogout м •мқҳлҗЁ вҖ” 3мҙҲ нӣ„ мӢӨн–ү (м·ЁмҶҢн•ҳл Өл©ҙ мғҲлЎңкі м№Ё)', 'ok');
    setTimeout(() => { handleLogout(); }, 3000);
  } else {
    log('вқҢ handleLogout н•ЁмҲҳ м—ҶмқҢ. logout() мӢңлҸ„', 'err');
    if (typeof logout === 'function') { logout(); }
    else if (typeof window.logout === 'function') { window.logout(); }
    else { log('вқҢ logoutлҸ„ м—ҶмқҢ!', 'err'); }
  }
}
function testWindowLogout() {
  log('в–¶ window.logout() нҳём¶ң');
  if (typeof window.logout === 'function') {
    log('вң… window.logout мһҲмқҢ вҖ” 3мҙҲ нӣ„ мӢӨн–ү', 'ok');
    setTimeout(() => { window.logout(); }, 3000);
  } else {
    log('вқҢ window.logout м—ҶмқҢ!', 'err');
  }
}

// нҺҳмқҙм§Җ лЎңл“ң мӢң нҷ•мқё
document.addEventListener('DOMContentLoaded', function() {
  console.log('[logout-test] DOMContentLoaded');
  log('DOMContentLoaded мӢӨн–ү');
  checkLS();
  checkDOM();
  checkListeners();

  // initAuthHeader нҳём¶ң
  if (typeof initAuthHeader === 'function') {
    initAuthHeader();
    log('вң… initAuthHeader() нҳём¶ң мҷ„лЈҢ', 'ok');
    checkDOM();
    checkListeners();
  } else {
    log('вқҢ initAuthHeader м—ҶмқҢ!', 'err');
  }

  // 1мҙҲ нӣ„ мһ¬нҷ•мқё
  setTimeout(function() {
    log('--- 1мҙҲ нӣ„ мһ¬нҷ•мқё ---');
    checkDOM();
    checkListeners();
  }, 1000);
});
</script>
</body>
</html>
