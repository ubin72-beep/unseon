function _toAbsDay(y, m, d) {
  const Y = m <= 2 ? y - 1 : y;
  const M = m <= 2 ? m + 12 : m;
  const A = Math.floor(Y / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25*(Y+4716)) + Math.floor(30.6001*(M+1)) + d + B - 1524 - 2415051;
}

/* ============================================================
   갭 검증
   r = RAW[i] → 인덱스: [0]=춘절월 [1]=춘절일 [2]=윤달
                         [3~14]=m1~m12 [15]=윤달일수
   ============================================================ */
const errors = [], okYears = [];

for (let i = 0; i < RAW.length - 1; i++) {
  const r  = RAW[i];
  const nr = RAW[i + 1];
  const y  = 1900 + i;
  const ny = 1901 + i;

  // 춘절 절대일수
  const abs  = _toAbsDay(y,  r[0],  r[1]);
  const nabs = _toAbsDay(ny, nr[0], nr[1]);
  const gap  = nabs - abs;

  // DB 월합
  const monthSum = r[3]+r[4]+r[5]+r[6]+r[7]+r[8]+r[9]+r[10]+r[11]+r[12]+r[13]+r[14];
  const leapSum  = r[2] > 0 ? r[15] : 0;
  const dbt      = monthSum + leapSum;

  const diff = gap - dbt;
  if (diff !== 0) {
    errors.push({ y, gap, dbt, diff, leap: r[2], leapD: r[15],
      months: r.slice(3,15) });
  } else {
    okYears.push(y);
  }
}

}

/* ============================================================
   날짜 변환 (Gemini 검증 기준)
   ============================================================ */
function solarToLunar(sy, sm, sd) {
  for (let i = 0; i < RAW.length - 1; i++) {
    const r    = RAW[i],  nr = RAW[i+1];
    const y    = 1900 + i, ny = 1901 + i;
    const base = _toAbsDay(y,  r[0],  r[1]);
    const next = _toAbsDay(ny, nr[0], nr[1]);
    const tgt  = _toAbsDay(sy, sm, sd);
    if (tgt < base || tgt >= next) continue;
    let off = tgt - base;
    const lm = r[2], ld = r[2] > 0 ? r[15] : 0;
    for (let m = 1; m <= 12; m++) {
      const d = r[2 + m]; // r[3]~r[14]
      if (off < d) return `${y}년 ${m}월 ${off+1}일`;
      off -= d;
      if (lm === m) {
        if (off < ld) return `${y}년 윤${m}월 ${off+1}일`;
        off -= ld;
      }
    }
  }
  return '범위초과';
}

function lunarToSolar(ly, lm, ld, isLeap) {
  const i = ly - 1900;
  if (i < 0 || i >= RAW.length - 1) return '범위초과';
  const r   = RAW[i];
  const lp  = r[2], lpd = r[2] > 0 ? r[15] : 0;
  let offset = 0;
  for (let m = 1; m <= 12; m++) {
    if (!isLeap && m === lm) { offset += ld - 1; break; }
    offset += r[2 + m];
    if (lp === m) {
      if (isLeap && m === lm) { offset += ld - 1; break; }
      offset += lpd;
    }
  }
  const absD = _toAbsDay(ly, r[0], r[1]) + offset;
  // 절대일 → 양력
  const jdn = absD + 2415051;
  const z   = Math.floor(jdn + 0.5);
  const a   = Math.floor((z - 1867216.25) / 36524.25);
  const aa  = z + 1 + a - Math.floor(a / 4);
  const b   = aa + 1524;
  const c   = Math.floor((b - 122.1) / 365.25);
  const d2  = Math.floor(365.25 * c);
  const e   = Math.floor((b - d2) / 30.6001);
  const dd  = b - d2 - Math.floor(30.6001 * e);
  const mm  = e < 14 ? e - 1 : e - 13;
  const yy  = mm > 2 ? c - 4716 : c - 4715;
  return `${yy}-${String(mm).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
}

  ['양력→음력: 2023-01-22', 'S2L', [2023,1,22],        '2023년 1월 1일'],
  ['음력→양력: 1969년 8월 17일', 'L2S', [1969,8,17,false],  '1969-09-28'],
  ['음력→양력: 1973년 1월 3일',  'L2S', [1973,1,3,false],   '1973-02-05'],
  ['음력→양력: 2024년 1월 1일',  'L2S', [2024,1,1,false],   '2024-02-10'],
  ['음력→양력: 2023년 1월 1일',  'L2S', [2023,1,1,false],   '2023-01-22'],
];

let pass = 0, fail = 0;
TESTS.forEach(([desc, fn, args, expected]) => {
  const got = fn === 'S2L' ? solarToLunar(...args) : lunarToSolar(...args);
  const ok  = got === expected;
  if (ok) pass++; else fail++;
  console.log(`${ok?'✅':'❌'} ${desc} → ${got}  (기대: ${expected})`);
});
console.log(`\n결과: ${pass}개 통과 / ${fail}개 실패`);
</script>
