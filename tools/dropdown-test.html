<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<title>드롭다운 동작 검증 테스트</title>
<link rel="stylesheet" href="../css/style.css?v=20260514">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
<style>
body { font-family: sans-serif; padding-top: 80px; padding-left: 20px; background: #f5f5f5; }
.log { background: #1a1a1a; color: #0f0; padding: 16px; border-radius: 8px;
       font-size: 0.85rem; line-height: 1.8; margin-top: 20px; height: 260px; overflow-y: auto; }
.log .err  { color: #ff5252; }
.log .ok   { color: #69f0ae; }
.log .warn { color: #ffd740; }
button { padding: 8px 16px; margin: 4px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.88rem; }
.btn-primary { background: #2c5f4f; color: #fff; }
.btn-danger  { background: #c62828; color: #fff; }
.result-box  { background: #fff; border: 2px solid #ddd; border-radius: 10px; padding: 14px; margin-top: 12px; }
</style>
</head>
<body>

<!-- ===== 실제 헤더 구조 그대로 복제 ===== -->
<header class="site-header" id="siteHeader">
  <div class="container header-inner">
    <a href="../index.html" class="logo">운세<span class="logo-on">ON</span></a>
    <div class="header-actions" id="headerActions">
      <div class="point-display" id="headerPoints" style="display:none">
        <i class="fas fa-coins"></i> <span id="headerPointVal">0</span>P
      </div>
      <a href="../auth.html" class="btn btn-login" id="btnLogin"><i class="fas fa-sign-in-alt"></i> 로그인</a>
      <a href="../auth.html?tab=register" class="btn btn-signup" id="btnSignup"><i class="fas fa-user-plus"></i> 회원가입</a>
      <div class="user-menu-wrap" id="userMenuWrap" style="display:none">
        <button class="user-menu-btn" id="userMenuBtn">
          <div class="user-avatar" id="userAvatar">U</div>
          <span class="user-name-label" id="userNameLabel">사용자</span>
          <i class="fas fa-chevron-down" style="font-size:0.7rem"></i>
        </button>
        <div class="user-dropdown" id="userDropdown" style="display:none">
          <div class="user-dropdown-header">
            <div class="user-dropdown-name" id="dropdownName"></div>
            <div class="user-dropdown-email" id="dropdownEmail"></div>
            <div class="user-dropdown-pt"><i class="fas fa-coins"></i> <span id="dropdownPtVal">0</span>P</div>
          </div>
          <div class="user-dropdown-links">
            <a href="#"><i class="fas fa-coins"></i> 포인트 충전</a>
            <a href="#"><i class="fas fa-history"></i> 이용 내역</a>
            <a href="#"><i class="fas fa-user-cog"></i> 내 정보</a>
          </div>
          <button class="user-logout-btn" id="userLogoutBtn"><i class="fas fa-sign-out-alt"></i> 로그아웃</button>
        </div>
      </div>
      <a href="#" class="btn btn-charge" id="btnCharge">충전하기</a>
    </div>
  </div>
</header>

<div class="result-box">
  <h3>🔬 드롭다운 동작 검증</h3>
  <button class="btn-primary" onclick="step1_setLogin()">① 로그인 상태 시뮬레이션</button>
  <button class="btn-primary" onclick="step2_initHeader()">② initAuthHeader() 호출</button>
  <button class="btn-primary" onclick="step3_clickBtn()">③ 메뉴버튼 클릭 시뮬레이션</button>
  <button class="btn-danger"  onclick="step4_clickLogout()">④ 로그아웃 버튼 클릭 (3초 후)</button>
  <button onclick="step5_checkAll()">⑤ 전체 상태 확인</button>
  <button onclick="clearLogin()" style="background:#888;color:#fff">로그인 정보 초기화</button>
</div>

<div class="result-box" id="statusBox">
  <h3>📊 현재 상태</h3>
  <div id="statusContent">버튼을 눌러 테스트하세요.</div>
</div>

<div class="log" id="logBox">로그 시작...<br/></div>

<script src="../js/auth.js?v=20260514a"></script>
<script>
const logBox = document.getElementById('logBox');
function log(msg, type='') {
  console.log('[dropdown-test] ' + msg);
  const d = document.createElement('div');
  d.className = type;
  d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  logBox.appendChild(d);
  logBox.scrollTop = logBox.scrollHeight;
}

function step1_setLogin() {
  const fakeUser = {
    id: 'test-001',
    name: '김미화',
    email: 'kimtest@unseon.co.kr',
    points: 1500
  };
  localStorage.setItem('sajuon_current_user', JSON.stringify(fakeUser));
  localStorage.setItem('sajuon_points', '1500');
  log('✅ localStorage에 테스트 유저 저장: ' + fakeUser.name, 'ok');
  step5_checkAll();
}

function step2_initHeader() {
  // data-authInit 플래그 초기화 (재실행 허용)
  const ha = document.getElementById('headerActions');
  if (ha) delete ha.dataset.authInit;

  if (typeof initAuthHeader === 'function') {
    initAuthHeader();
    log('✅ initAuthHeader() 호출 완료', 'ok');
  } else {
    log('❌ initAuthHeader 없음!', 'err');
  }
  step5_checkAll();
}

function step3_clickBtn() {
  const btn = document.getElementById('userMenuBtn') || document.querySelector('.user-menu-btn');
  if (!btn) { log('❌ .user-menu-btn 버튼 없음!', 'err'); return; }
  log('▶ 메뉴버튼 click() 강제 호출');
  btn.click();

  setTimeout(function() {
    const wrap = document.getElementById('userMenuWrap');
    const dd   = document.getElementById('userDropdown');
    const isOpen = wrap && wrap.classList.contains('menu-open');
    const ddVisible = dd && dd.style.display !== 'none';
    if (isOpen && ddVisible) {
      log('✅ 드롭다운 열림 성공! menu-open 클래스 있음, display:block', 'ok');
    } else {
      log('❌ 드롭다운 열리지 않음. menu-open=' + isOpen + ', display=' + (dd ? dd.style.display : 'N/A'), 'err');
    }
    step5_checkAll();
  }, 100);
}

function step4_clickLogout() {
  const btn = document.getElementById('userLogoutBtn') || document.querySelector('.user-logout-btn');
  if (!btn) { log('❌ .user-logout-btn 없음!', 'err'); return; }
  log('▶ 로그아웃 버튼 click() — 3초 후 실행', 'warn');
  setTimeout(function() {
    log('▶ 로그아웃 버튼 click() 실행!');
    btn.click();
  }, 3000);
}

function clearLogin() {
  localStorage.removeItem('sajuon_current_user');
  localStorage.removeItem('sajuon_points');
  log('⚠️ localStorage 초기화됨', 'warn');
  step5_checkAll();
}

function step5_checkAll() {
  const wrap     = document.getElementById('userMenuWrap');
  const dd       = document.getElementById('userDropdown');
  const menuBtn  = document.querySelector('.user-menu-btn, #userMenuBtn');
  const logoutBtn= document.querySelector('.user-logout-btn, #userLogoutBtn');
  const user     = localStorage.getItem('sajuon_current_user');
  const isBound  = menuBtn && menuBtn.dataset.bound;
  const isMenuOpen = wrap && wrap.classList.contains('menu-open');

  let html = `<table style="font-size:0.88rem;border-collapse:collapse;width:100%">`;
  const row = (label, val, ok) =>
    `<tr><td style="padding:3px 8px;color:#666">${label}</td>
         <td style="padding:3px 8px;font-weight:600;color:${ok?'green':'#c62828'}">${val}</td></tr>`;

  html += row('localStorage 유저', user ? JSON.parse(user).name : '없음 (비로그인)', !!user);
  html += row('#userMenuWrap display', wrap ? (wrap.style.display||'css기본') : '요소없음', wrap && wrap.style.display==='flex');
  html += row('#userDropdown display', dd ? (dd.style.display||'hidden') : '요소없음', dd && dd.style.display==='block');
  html += row('menu-open 클래스', isMenuOpen ? '있음 (열림)' : '없음 (닫힘)', true);
  html += row('.user-menu-btn 존재', menuBtn ? '있음' : '없음!', !!menuBtn);
  html += row('data-bound 플래그', isBound ? '있음 (이벤트 바인딩됨)' : '없음 (미바인딩)', !!isBound);
  html += row('.user-logout-btn 존재', logoutBtn ? '있음' : '없음!', !!logoutBtn);
  html += row('window.toggleUserMenu', typeof window.toggleUserMenu, typeof window.toggleUserMenu==='function');
  html += row('window._openUserMenu', typeof window._openUserMenu, typeof window._openUserMenu==='function');
  html += `</table>`;

  document.getElementById('statusContent').innerHTML = html;
}

document.addEventListener('DOMContentLoaded', function() {
  log('DOMContentLoaded');
  step5_checkAll();
  log('준비 완료 — ① 버튼부터 순서대로 클릭하세요', 'ok');
});
</script>
</body>
</html>
