<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관리자 대시보드 — 운세ON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body class="admin-body">

<!-- ADMIN LAYOUT -->
<div class="admin-layout">

  <!-- 사이드바 -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-logo">
      <a href="index.html" style="color:inherit;text-decoration:none">운세<span style="color:var(--accent)">ON</span></a>
      <span class="admin-badge">관리자</span>
    </div>
    <nav class="admin-nav" id="adminNav">
      <button type="button" class="admin-nav-item active" data-section="dash" onclick="switchSection('dash')">
        <i class="fas fa-chart-bar"></i> 대시보드
      </button>
      <button type="button" class="admin-nav-item" data-section="banner" onclick="switchSection('banner')">
        <i class="fas fa-bullhorn"></i> 배너·카피 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="category" onclick="switchSection('category')">
        <i class="fas fa-th-large"></i> 카테고리 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="pricing" onclick="switchSection('pricing')">
        <i class="fas fa-coins"></i> 요금 정책 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="reviews" onclick="switchSection('reviews')">
        <i class="fas fa-star"></i> 후기 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="faq" onclick="switchSection('faq')">
        <i class="fas fa-question-circle"></i> FAQ 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="history" onclick="switchSection('history')">
        <i class="fas fa-history"></i> 이용 내역 조회
      </button>
      <button type="button" class="admin-nav-item" data-section="members" onclick="switchSection('members')">
        <i class="fas fa-users"></i> 회원 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="points" onclick="switchSection('points')">
        <i class="fas fa-plus-circle"></i> 포인트 조작
      </button>
      <button type="button" class="admin-nav-item" data-section="ai" onclick="switchSection('ai')" id="aiMenuBtn">
        <i class="fas fa-robot"></i> AI 설정
      </button>
    </nav>
    <div class="admin-sidebar-footer">
      <a href="index.html" class="admin-back-btn"><i class="fas fa-home"></i> 사이트로 돌아가기</a>
    </div>
  </aside>

  <!-- 메인 -->
  <main class="admin-main">
    <div class="admin-topbar">
      <button class="admin-menu-toggle" id="adminMenuToggle">
        <i class="fas fa-bars"></i>
      </button>
      <h1 class="admin-page-title" id="adminPageTitle">대시보드</h1>
      <div class="admin-topbar-right">
        <div class="admin-pt-display"><i class="fas fa-coins"></i> <span id="adminPtVal">0</span>P</div>
      </div>
    </div>

    <div class="admin-content" id="adminContent">
      <!-- JS로 섹션 렌더링 -->
    </div>
  </main>
</div>

<!-- 알림 토스트 -->
<div class="toast" id="adminToast"></div>

<script src="js/auth.js?v=20260401"></script>
<script src="js/main.js?v=20260401"></script>
<script src="js/gemini.js?v=20260401"></script>
<script src="js/admin.js?v=20260401"></script>
</body>
</html>
