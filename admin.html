<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>관리자 대시보드 — 운세ON</title>
  <!-- 검색엔진 수집 완전 차단 -->
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css?v=20260502"/>
  <link rel="stylesheet" href="css/admin.css?v=20260502"/>
  <style>
    /* 대시보드: 인증 전 숨김, 인증 후 표시 */
    #adminLayout { display: none; }
    #adminLayout.auth-ok { display: flex; }
  </style>
</head>
<body class="admin-body">

<!-- ADMIN LAYOUT — 인증 성공 후 JS가 auth-ok 클래스 추가 -->
<div class="admin-layout" id="adminLayout">

  <!-- 사이드바 -->
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-logo">
      <a href="index.html" style="color:inherit;text-decoration:none">운세<span style="color:var(--accent)">ON</span></a>
      <span class="admin-badge">관리자</span>
    </div>
    <nav class="admin-nav" id="adminNav">
      <button type="button" class="admin-nav-item active" data-section="dash" onclick="switchSection('dash')">
        <i class="fas fa-chart-bar"></i> 대시보드
      </button>
      <button type="button" class="admin-nav-item" data-section="banner" onclick="switchSection('banner')">
        <i class="fas fa-bullhorn"></i> 배너·카피 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="category" onclick="switchSection('category')">
        <i class="fas fa-th-large"></i> 카테고리 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="pricing" onclick="switchSection('pricing')">
        <i class="fas fa-coins"></i> 요금 정책 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="reviews" onclick="switchSection('reviews')">
        <i class="fas fa-star"></i> 후기 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="faq" onclick="switchSection('faq')">
        <i class="fas fa-question-circle"></i> FAQ 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="history" onclick="switchSection('history')">
        <i class="fas fa-history"></i> 이용 내역 조회
      </button>
      <button type="button" class="admin-nav-item" data-section="members" onclick="switchSection('members')">
        <i class="fas fa-users"></i> 회원 관리
      </button>
      <button type="button" class="admin-nav-item" data-section="points" onclick="switchSection('points')">
        <i class="fas fa-plus-circle"></i> 포인트 조작
      </button>
      <button type="button" class="admin-nav-item" data-section="ai" onclick="switchSection('ai')" id="aiMenuBtn">
        <i class="fas fa-robot"></i> AI 설정
      </button>
      <button type="button" class="admin-nav-item" data-section="security" onclick="switchSection('security')">
        <i class="fas fa-shield-alt"></i> 보안·계정 설정
      </button>
      <a href="seo-guide.html" class="admin-nav-item" style="display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;background:rgba(255,152,0,0.12);border:1px solid rgba(255,152,0,0.3)">
        <i class="fas fa-search" style="color:#ff9800"></i> 검색엔진 홍보 가이드
      </a>
    </nav>
    <div class="admin-sidebar-footer">
      <button onclick="adminLogout()" class="admin-back-btn" style="width:100%;text-align:left;background:none;border:none;cursor:pointer;color:inherit">
        <i class="fas fa-sign-out-alt"></i> 로그아웃
      </button>
      <a href="index.html" class="admin-back-btn"><i class="fas fa-home"></i> 사이트로 돌아가기</a>
    </div>
  </aside>

  <!-- 메인 -->
  <main class="admin-main">
    <div class="admin-topbar">
      <button class="admin-menu-toggle" id="adminMenuToggle">
        <i class="fas fa-bars"></i>
      </button>
      <h1 class="admin-page-title" id="adminPageTitle">대시보드</h1>
      <div class="admin-topbar-right">
        <div class="admin-pt-display"><i class="fas fa-coins"></i> <span id="adminPtVal">0</span>P</div>
      </div>
    </div>

    <div class="admin-content" id="adminContent">
      <!-- JS로 섹션 렌더링 -->
    </div>
  </main>
</div>

<!-- 알림 토스트 -->
<div class="toast" id="adminToast"></div>

<!-- ===== 관리자 로그인 오버레이 ===== -->
<div class="admin-login-overlay" id="adminLoginOverlay">
  <div class="admin-login-box">
    <div class="admin-login-logo">
      운세<span>ON</span>
      <span class="admin-login-badge">관리자</span>
    </div>
    <h2 class="admin-login-title"><i class="fas fa-lock"></i> 관리자 로그인</h2>
    <p class="admin-login-desc">관리자 계정으로 로그인하세요</p>

    <div class="admin-login-form">
      <form onsubmit="adminLogin();return false;" autocomplete="on">
      <div class="admin-login-field">
        <label><i class="fas fa-user"></i> 아이디</label>
        <input type="text" id="adminIdInput" placeholder="관리자 아이디 입력"
               autocomplete="username" />
      </div>
      <div class="admin-login-field">
        <label><i class="fas fa-lock"></i> 비밀번호</label>
        <div class="admin-pw-wrap">
          <input type="password" id="adminPwInput" placeholder="비밀번호 입력"
                 autocomplete="current-password" />
          <button type="button" class="admin-pw-toggle" onclick="toggleAdminPw()">
            <i class="fas fa-eye" id="adminPwEyeIcon"></i>
          </button>
        </div>
      </div>
      <div class="admin-login-error" id="adminLoginError"></div>
      <button type="submit" class="admin-login-btn" id="adminLoginBtn">
        <span id="adminLoginBtnText"><i class="fas fa-sign-in-alt"></i> 로그인</span>
        <span id="adminLoginBtnLoading" style="display:none"><i class="fas fa-spinner fa-spin"></i> 확인 중...</span>
      </button>
      </form>
    </div>

    <p class="admin-login-hint">
      <i class="fas fa-shield-alt"></i> 관리자 전용 페이지입니다
    </p>
    <a href="index.html" class="admin-login-back">
      <i class="fas fa-arrow-left"></i> 사이트로 돌아가기
    </a>
  </div>
</div>

<script src="js/auth.js?v=20260412c"></script>
<script src="js/main.js?v=20260407"></script>
<script src="js/gemini.js?v=20260502"></script>
<script src="js/admin.js?v=20260407"></script>
</body>
</html>
