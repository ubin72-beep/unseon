<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"/><title>중복계정 정리</title>
<style>body{font-family:monospace;padding:20px;background:#111;color:#0f0;font-size:0.9rem;line-height:2}
.ok{color:#69f0ae}.err{color:#ff5252}.warn{color:#ffd740}</style>
</head>
<body><pre id="out"></pre>
<script>
const out = document.getElementById('out');
function log(m,c){
  console.log('[cleanup]',m);
  const s=document.createElement('span');
  s.className=c||'';s.textContent=m+'\n';out.appendChild(s);
}
function tick(ms){return new Promise(r=>setTimeout(r,ms));}

async function run(){
  log('=== kakaotest 중복 계정 정리 ===','warn');

  /* 전체 조회 */
  const r = await fetch('tables/users?limit=100');
  const d = await r.json();
  const all = d.data||[];
  log('전체 계정: '+all.length+'개');

  const ktAll = all.filter(u=>u.email==='kakaotest@unseon.co.kr');
  log('kakaotest 계정: '+ktAll.length+'개','warn');
  ktAll.forEach(u=>log('  id='+u.id+' | pw_hash='+u.pw_hash, u.pw_hash==='h_80fxj9_9'?'ok':'err'));

  /* 올바른 계정(h_80fxj9_9)은 남기고 나머지 삭제 */
  const toKeep   = ktAll.find(u=>u.pw_hash==='h_80fxj9_9');
  const toDelete = ktAll.filter(u=>u.pw_hash!=='h_80fxj9_9');

  log('\n남길 계정: '+(toKeep?toKeep.id:'없음!'), toKeep?'ok':'err');
  log('삭제 대상: '+toDelete.length+'개','warn');

  for(const u of toDelete){
    log('DELETE: '+u.id+' (hash='+u.pw_hash+')');
    const dr = await fetch('tables/users/'+u.id,{method:'DELETE'});
    log('  → HTTP '+dr.status, dr.status===204?'ok':'err');
    await tick(300);
  }

  /* 재확인 */
  await tick(500);
  log('\n=== 최종 확인 ===','warn');
  const r2 = await fetch('tables/users?limit=100');
  const d2 = await r2.json();
  const kt2 = (d2.data||[]).filter(u=>u.email==='kakaotest@unseon.co.kr');
  log('잔존 kakaotest 계정: '+kt2.length+'개', kt2.length===1?'ok':'err');
  kt2.forEach(u=>{
    log('  id='+u.id,'ok');
    log('  pw_hash='+u.pw_hash, u.pw_hash==='h_80fxj9_9'?'ok':'err');
    log('  status='+u.status);
  });

  if(kt2.length===1 && kt2[0].pw_hash==='h_80fxj9_9'){
    log('\n✅ 완료! 이제 kakaotest@unseon.co.kr / kakao1234 로그인 가능','ok');
  } else {
    log('\n❌ 문제 잔존','err');
  }
  console.log('[cleanup] DONE. remaining='+kt2.length);
}
document.addEventListener('DOMContentLoaded', run);
</script>
</body>
</html>
